<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作性價比測試</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>工作性價比測試</h1>
        <form id="workForm">
            <div class="form-group">
                <label for="salary">年薪（萬元）</label>
                <input type="number" id="salary" required min="0" step="0.1">
            </div>
            <div class="form-group">
                <label for="workDays">每周工作天數</label>
                <input type="number" id="workDays" required min="1" max="7">
            </div>
            <div class="form-group">
                <label for="dailyHours">每天總工時（小時）</label>
                <input type="number" id="dailyHours" required min="0" step="0.1">
            </div>
            <div class="form-group">
                <label for="commuteTime">每天通勤時間（小時）</label>
                <input type="number" id="commuteTime" required min="0" step="0.1">
            </div>
            <div class="form-group">
                <label for="vacationDays">特休天數</label>
                <input type="number" id="vacationDays" required min="0">
            </div>
            <div class="form-group">
                <label for="workFromHome">在家工作天數（每周）</label>
                <input type="number" id="workFromHome" required min="0">
            </div>
            <div class="form-group">
                <label for="education">學歷</label>
                <select id="education" required>
                    <option value="高中">高中</option>
                    <option value="專科">專科</option>
                    <option value="大學">大學</option>
                    <option value="碩士">碩士</option>
                    <option value="博士">博士</option>
                </select>
            </div>
            <div class="form-group">
                <label for="experience">工作年限（年）</label>
                <input type="number" id="experience" required min="0" step="0.1">
            </div>
            <button type="submit">計算性價比</button>
        </form>
        <div class="report" id="report">
            <div class="score-container">
                <div class="score" id="finalScore"></div>
                <div class="score-label">工作性價比評分</div>
            </div>
            <div class="chart-container">
                <canvas id="scoreChart"></canvas>
            </div>
            <div class="overall-assessment" id="overallAssessment"></div>
            <div class="improvement-suggestions" id="improvementSuggestions"></div>
            <div class="simulator-section" id="simulatorSection"></div>
            <div class="dimensions" id="dimensions"></div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
